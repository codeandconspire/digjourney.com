name = "digjourney"
pages_build_output_dir = "out"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set in the Pages dashboard → Settings → Environment variables):
#   HUBSPOT_API_KEY
#   HUBSPOT_SUBSCRIPTION_ID
# These are consumed by functions/api/subscribe.js. The /media and
# /api/prismic-preview functions need no secrets, but /media requires Image
# Transformations to be enabled on the zone (Cloudflare dashboard → Images →
# Transformations). Prismic content is public.
